<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, " />
  <title>Farmify — Farm-to-Business Platform</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
      background:
        radial-gradient(ellipse 70% 50% at 50% 30%, rgba(74, 124, 89, 0.1) 0%, transparent 60%),
        var(--warm-white);
    }

    .hero-content { max-width: 640px; }

    .hero-brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 40px;
    }

    .hero-brand-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--moss), var(--leaf));
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      box-shadow: 0 8px 24px rgba(45, 90, 61, 0.35);
    }

    .hero-brand-name {
      font-family: var(--font-display);
      font-size: 40px;
      font-weight: 700;
      color: var(--forest);
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: 52px;
      font-weight: 700;
      color: var(--forest);
      line-height: 1.1;
      margin-bottom: 20px;
    }

    .hero-title span { color: var(--harvest); font-style: italic; }

    .hero-desc {
      font-size: 18px;
      color: var(--mid-gray);
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .hero-cta {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>

    <style>
    @media (max-width: 768px) {
      .hero-title { font-size: clamp(32px, 8vw, 52px) !important; }
      .hero-brand-name { font-size: clamp(28px, 7vw, 40px) !important; }
      .hero-desc { font-size: 16px !important; }
      .hero-cta .btn { flex: 1 1 200px; }
      .hero { padding: 40px 20px; }
    }
    </style>

</head>
<body>
<div class="bg-texture"></div>

<div class="hero">
  <div class="hero-content page-enter">
    <div class="hero-brand">
      <div class="hero-brand-icon">🌿</div>
      <div class="hero-brand-name">Farmify</div>
    </div>
    <h1 class="hero-title">
      Direct Market,<br>
      <span>Better Income</span>
    </h1>
    <p class="hero-desc">
      Platform Farm-to-Business yang menghubungkan petani lokal langsung dengan pembeli industri — tanpa perantara, harga transparan, logistik teroptimasi.
    </p>
    <div class="hero-cta">
      <a href="login.html" class="btn btn-primary btn-lg">Masuk ke Platform</a>
      <a href="register.html" class="btn btn-secondary btn-lg">Daftar Sekarang</a>
    </div>
  </div>
</div>

<script src="js/db.js"></script>
<script>
  // Redirect if already logged in
  const session = FarmifyDB.getSession();
  if (session) window.location.href = getDashboardUrl(session.role);
</script>
</body>
</html>
